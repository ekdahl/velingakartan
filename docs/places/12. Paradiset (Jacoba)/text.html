<h1>12. Paradiset (Jacoba)</h1>
<p>Backstuga på Velinga Storegården. Skylt uppsatt i maj 1989.
Stugan revs cirka 1910- 1920 och idag finns bara ett stenröse kvar i skogsmarken där den var belägen. 
Backstugan kallades ”Jacoba” troligen efter Nils Jacob Johansson, född år 1826 i Acklinga</p>
