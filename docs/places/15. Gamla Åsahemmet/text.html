  <title>15. Gamla Åsahemmet</title>

  <article>
<p>Backstuga under Berga. Har även angivits som torp. Skylt uppsatt i maj 1989. Stugan låg vid vägen mellan Skräddareruder och Nya Åsahemmet, några tiotal meter från skyltens plats.
Några rester av bostället finns inte kvar. Platsen är igenplanterad med gran.</p>
