<h1>22. Källeberg</h1>
<p>Boställe söder om Svarvarehult. Skylt uppsatt i maj 1989.
Av stugan återstår idag endast husgrunden som mäter 4 x 8 meter. Mitt i den finns resterna av den raserade murstocken. Källeberg finns bara med i husförhörslängderna under en kort period.</p>
