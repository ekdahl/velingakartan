  <title>133. Västerberga</title>
</head>
<body>
  <article>
<p>Torpställe under Berga senare avstyckat till egen gård. Totalt omfattade gården Västerberga 32 hektar. Ett hus finns kvar på platsen där det även finns tre husgrunder. Skylt utsatt 1992.</p>
<p>På 1940-talet flyttades boningshuset till Sjogerdala och uppfördes som Filadelfiakapell.</p>
