<h1>17. Bengta</h1>
<p>Torp under Ekekullen beläget strax sydost om gården. Rester av murstock och stenfot finns kvar. Skylt uppsatt 1989.
Stället namnges som ”Bengta” i en skifteshandling för Ekekullen daterad 1876, troligen efter fattighjonet Bengt Svensson som uppges ha bott i en stuga under Ekekullen.</p>
