<!doctype html>
<html lang="sv">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Historic settlement</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet/dist/leaflet.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.css">
	<link rel="stylesheet" href="https://unpkg.com/leaflet.fullscreen/dist/Control.FullScreen.css">
	<link rel="stylesheet" href="css/framework.css">

	<link rel="icon" href="favicon.svg" type="image/svg+xml">

	<!-- Follow light/dark system theme -->
	<script>
		const media = window.matchMedia('(prefers-color-scheme: dark)');
		function updateTheme() {
			document.documentElement.setAttribute('data-bs-theme', media.matches ? 'dark' : 'light');
  		}
		updateTheme(); // initial
		media.addEventListener('change', updateTheme);
	</script>
</head>

<body>
	<main id="map" class="w-100 vh-100">

	<div class="modal fade" id="placeModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<h1 class="modal-title fs-5" id="placeModalTitle">Info</h1>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      			</div>
				<div class="modal-body" id="placeModalBody">Loading...</div>
			</div>
  		</div>
	</div>

	</main>
	<script src="https://cdn.jsdelivr.net/npm/leaflet/dist/leaflet.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>
	<script src="https://unpkg.com/leaflet.fullscreen/dist/Control.FullScreen.umd.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
	<script src="js/app.js"></script>
</body>
</html>
