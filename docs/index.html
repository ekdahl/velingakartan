<!doctype html>
<html lang="sv">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Historic settlement</title>

	<!-- Bootstrap -->
	<link rel="stylesheet"
		  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

	<!-- Leaflet -->
	<link rel="stylesheet"
		  href="https://unpkg.com/leaflet/dist/leaflet.css">

	<!-- Bootstrap Icons -->
	<link rel="stylesheet"
		  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

	<!-- Framework CSS -->
	<link rel="stylesheet" href="css/framework.css">
</head>

<body class="vh-100">

	<div class="container-fluid vh-100">
		<div class="row h-100">

			<!-- Map -->
			<main class="col-9 p-0 position-relative">
				<div id="map" class="w-100 h-100"></div>

				<div class="position-absolute bottom-0 start-0 end-0 bg-light p-2">
					<label for="yearSlider" class="form-label mb-0">
						År: <span id="currentYear"></span>
					</label>
					<input id="yearSlider"
						   type="range"
						   class="form-range">
				</div>
			</main>

			<!-- Side panel -->
			<aside class="col-3 border-start p-3 overflow-auto">

				<div class="d-flex justify-content-between align-items-center mb-3">
					<h3 id="title">Laddar...</h3>
					<div class="dropdown">
						<button id="themeToggle" class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Theme selector">
							<i class="bi bi-circle-half"></i>
						</button>
						<ul class="dropdown-menu">
							<li><a class="dropdown-item" href="#" data-theme="auto"><i class="bi bi-circle-half"></i> Auto</a></li>
							<li><a class="dropdown-item" href="#" data-theme="light"><i class="bi bi-sun-fill"></i> Light</a></li>
							<li><a class="dropdown-item" href="#" data-theme="dark"><i class="bi bi-moon-fill"></i> Dark</a></li>
						</ul>
					</div>
				</div>

				<div class="mb-3">
					<input id="search"
						   class="form-control"
						   placeholder="Sök...">
				</div>

				<div id="layers"></div>

				<hr>

				<div id="details"></div>

			</aside>

		</div>
	</div>

	<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

	<script src="js/app.js"></script>

</body>
</html>
